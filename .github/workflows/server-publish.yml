name: Server Publish

on:
  release:
    types: created
    paths:
      - 'packages/drawio-mcp-server/**'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "23.x"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"
          cache-dependency-path: packages/drawio-mcp-server/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install
        working-directory: packages/drawio-mcp-server

      - name: Build
        run: pnpm run build
        working-directory: packages/drawio-mcp-server

      - name: Update npm to latest
        run: npm install -g npm@latest

      - name: Clear npm auth token
        run: npm config set //registry.npmjs.org/:_authToken ""

      - name: Publish
        run: npm publish --no-git-checks --provenance --access public
        working-directory: packages/drawio-mcp-server
